<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calcutor App</title>
    <!-- link CSS -->
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="container">
      <input type="text" class="display" placeholder="input" />
      <div class="btncontainer">
        <button data-="option" class="btn btn-option seven">7</button>
        <button data-="option" class="btn btn-option eight">8</button>
        <button data-="option" class="btn btn-option nine">9</button>
        <button data-="oparators" class="btn btn-operators divide">/</button>

        <button data-="option" class="btn btn-option four">4</button>
        <button data-="option" class="btn btn-option five">5</button>
        <button data-="option" class="btn btn-option six">6</button>
        <button data-="oparators" class="btn btn-operators add">+</button>

        <button data-="option" class="btn btn-option one">1</button>
        <button data-="option" class="btn btn-option two">2</button>
        <button data-="option" class="btn btn-option three">3</button>
        <button data-="oparators" class="btn btn-operators multiply">*</button>

        <button data-="option" class="btn btn-option zero">0</button>
        <button data-="option" class="btn btn-option dot">.</button>
        <button data-="oparators" class="btn btn-operators minus">-</button>
        <button data-="actions" class="btn btn-action equal">=</button>
        <button data-="actions" class="btn btn-action clear">C</button>
        <button data-="actions" class="btn btn-action delete">Del</button>
      </div>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
